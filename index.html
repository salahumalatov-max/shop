<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARYAM SHAKHMAEVA | Store</title>
    <style>
        :root {
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent-insta: #E1306C;
            --glass: rgba(255, 255, 255, 0.8);
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed; background-size: cover;
            color: var(--text); overflow-x: hidden;
        }

        /* Фикс кнопок для телефона */
        .screen { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .hidden { display: none !important; opacity: 0; }

        #welcome-screen { justify-content: center; align-items: center; text-align: center; backdrop-filter: blur(8px); }
        
        .brand-logo-main {
            font-size: clamp(1.2rem, 5vw, 2.2rem); font-weight: 200; text-transform: uppercase;
            margin-bottom: 50px; letter-spacing: 8px; padding: 15px 0; border-y: 1px solid rgba(0,0,0,0.1);
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; }

        /* ИСПРАВЛЕННЫЙ СТИЛЬ КНОПОК */
        .nav-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; border: 1px solid rgba(0,0,0,0.1); 
            background: white !important; /* Принудительно белый фон */
            color: var(--text) !important; /* Принудительно темный текст */
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase; border-radius: 50px;
            transition: var(--transition); cursor: pointer; text-decoration: none;
            -webkit-tap-highlight-color: transparent; /* Убирает синюю вспышку на iPhone */
        }

        .nav-btn:hover, .nav-btn:active { 
            background: var(--text) !important; 
            color: white !important; 
        }

        .nav-btn.instagram { border-color: var(--accent-insta); color: var(--accent-insta) !important; }
        .nav-btn.instagram:hover { background: var(--accent-insta) !important; color: white !important; }

        /* Каталог */
        .catalog-header { 
            padding: 20px; background: var(--glass); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .back-btn { background: none; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; color: var(--secondary); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; } /* Мобильная сетка сразу */

        @media (min-width: 850px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        }

        .card { background: var(--glass); border-radius: 25px; padding: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); }
        .img-wrapper { aspect-ratio: 3/4; border-radius: 18px; overflow: hidden; margin-bottom: 10px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .info h3 { font-size: 15px; margin: 0; font-weight: 400; }
        .info .price { font-size: 14px; font-weight: 600; margin-top: 5px; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { width: 90%; max-width: 400px; background: #fff; border-radius: 30px; overflow: hidden; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; background: #eee; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal-text { padding: 25px; }
        .order-btn { width: 100%; padding: 18px; background: var(--text); color: #fff; border: none; border-radius: 15px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen">
        <div class="brand-logo-main">MARYAM SHAKHMAEVA</div>
        <div class="btn-group">
            <button class="nav-btn" onclick="openCat('namaznik')">Намазники</button>
            <button class="nav-btn" onclick="openCat('dress')">Платья</button>
            <a href="https://instagram.com" target="_blank" class="nav-btn instagram">Instagram</a>
        </div>
    </div>

    <div id="catalog-screen" class="screen hidden">
        <header class="catalog-header">
            <button class="back-btn" onclick="closeCat()">← назад</button>
            <span style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase;">Каталог</span>
            <div style="width: 40px;"></div>
        </header>
        <div class="container">
            <h2 id="cat-title" style="text-align:center; font-weight:300; text-transform:uppercase; font-size: 18px;"></h2>
            <div id="product-grid" class="grid"></div>
        </div>
    </div>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <img id="modal-image" src="" style="width:100%; aspect-ratio:3/4; object-fit:cover;">
            <div class="modal-text">
                <h2 id="modal-title" style="margin:0; font-weight:300;"></h2>
                <p id="modal-price" style="font-weight:600; font-size:20px; margin: 10px 0;"></p>
                <p id="modal-desc" style="color:var(--secondary); font-size:14px; margin-bottom:20px;"></p>
                <button class="order-btn" onclick="orderWA()">Заказать</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { name: "Намазник «Аура»", price: "3 000 ₽", desc: "Премиальный хлопок, свободный крой.", cat: "namaznik", img: "images/NA1.png" },
            { name: "Платье «Ника»", price: "2 500 ₽", desc: "Элегантный силуэт, мягкая ткань.", cat: "dress", img: "images/NA2.png" }
        ];

        function openCat(category) {
            document.getElementById('welcome-screen').classList.add('hidden');
            const catalog = document.getElementById('catalog-screen');
            catalog.classList.remove('hidden');
            document.getElementById('cat-title').innerText = category === 'namaznik' ? 'Намазники' : 'Платья';
            
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.filter(p => p.cat === category).map(p => `
                <div class="card" onclick="openModal('${p.name}', '${p.price}', '${p.desc}', '${p.img}')">
                    <div class="img-wrapper"><img src="${p.img}"></div>
                    <div class="info"><h3>${p.name}</h3><p class="price">${p.price}</p></div>
                </div>`).join('');
            window.scrollTo(0, 0);
        }

        function closeCat() {
            // Исправленная логика возврата
            document.getElementById('catalog-screen').classList.add('hidden');
            document.getElementById('welcome-screen').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function openModal(name, price, desc, img) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = price;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-image').src = img;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); }

        function orderWA() {
            const name = document.getElementById('modal-title').innerText;
            window.open(`https://wa.me: ${name}`, '_blank');
        }
    </script>
</body>
</html>
