<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARYAM SHAKHMAEVA | Official Store</title>
    <style>
        :root {
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent-insta: #E1306C;
            --glass: rgba(255, 255, 255, 0.7);
            --transition: all 0.7s cubic-bezier(0.15, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #dce3ee 100%);
            background-attachment: fixed; background-size: cover;
            color: var(--text); overflow-x: hidden;
        }

        /* ЭФФЕКТНОЕ ПРИВЕТСТВИЕ ЛОГОТИПА */
        @keyframes revealLogo {
            from { opacity: 0; letter-spacing: 25px; filter: blur(15px); transform: translateY(20px); }
            to { opacity: 1; letter-spacing: 12px; filter: blur(0); transform: translateY(0); }
        }

        .screen { min-height: 100vh; display: flex; flex-direction: column; transition: var(--transition); }
        .hidden { display: none !important; opacity: 0; }

        /* ГЛАВНЫЙ ЭКРАН */
        #welcome-screen { justify-content: center; align-items: center; text-align: center; backdrop-filter: blur(5px); }
        
        .brand-logo-main {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            font-weight: 200;
            text-transform: uppercase;
            margin-bottom: 60px;
            animation: revealLogo 2s ease-out forwards;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 20px 0;
            width: fit-content;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; opacity: 0; animation: fadeIn 1s ease forwards 1s; }
        @keyframes fadeIn { to { opacity: 1; } }

        .nav-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 22px; border: 1px solid rgba(0,0,0,0.05); background: var(--glass);
            backdrop-filter: blur(15px); color: var(--text); text-decoration: none;
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase; border-radius: 60px;
            transition: var(--transition); cursor: pointer;
        }
        .nav-btn:hover { background: var(--text); color: #fff !important; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .nav-btn.instagram { border-color: var(--accent-insta); color: var(--accent-insta); }
        .nav-btn.instagram:hover { background: var(--accent-insta); color: #fff !important; }
        
        .insta-icon {
            width: 18px; height: 18px; margin-right: 8px; background-color: currentColor;
            -webkit-mask: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='2' width='20' height='20' rx='5' ry='5'%3E%3C/rect%3E%3Cpath d='M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z'%3E%3C/path%3E%3Cline x1='17.5' y1='6.5' x2='17.51' y2='6.5'%3E%3C/line%3E%3C/svg%3E") no-repeat center;
            mask: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='2' width='20' height='20' rx='5' ry='5'%3E%3C/rect%3E%3Cpath d='M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z'%3E%3C/path%3E%3Cline x1='17.5' y1='6.5' x2='17.51' y2='6.5'%3E%3C/line%3E%3C/svg%3E") no-repeat center;
        }

        /* КАТАЛОГ */
        .catalog-header { 
            padding: 20px 40px; background: var(--glass); backdrop-filter: blur(25px); 
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .header-logo-text { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
        .back-btn { background: none; border: none; cursor: pointer; text-transform: uppercase; font-size: 10px; color: var(--secondary); letter-spacing: 2px; }

        .container { max-width: 1300px; margin: 50px auto; padding: 0 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 50px 30px; }

        /* КАРТОЧКА */
        .card { background: var(--glass); border-radius: 40px; padding: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.5); transition: var(--transition); cursor: pointer; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 40px 80px rgba(0,0,0,0.12); }
        .img-wrapper { aspect-ratio: 3/4; border-radius: 25px; overflow: hidden; margin-bottom: 25px; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .card:hover img { transform: scale(1.05); }
        
        .info h3 { font-size: 20px; font-weight: 400; margin: 0 0 10px; letter-spacing: 0.5px; }
        .info .desc { font-size: 14px; color: var(--secondary); line-height: 1.6; margin-bottom: 15px; }
        .info .price { font-size: 18px; font-weight: 600; }

        /* ZOOM MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(30px); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s ease; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { display: flex; max-width: 1100px; width: 95%; background: #fff; border-radius: 50px; overflow: hidden; box-shadow: 0 60px 120px rgba(0,0,0,0.15); position: relative; }
        .modal-close { position: absolute; top: 30px; right: 30px; font-size: 20px; cursor: pointer; z-index: 10; background: #f5f5f7; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .modal-close:hover { background: #e5e5e7; transform: rotate(90deg); }
        
        .modal-img { width: 55%; aspect-ratio: 3/4; }
        .modal-img img { width: 100%; height: 100%; object-fit: cover; }
        .modal-text { width: 45%; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .modal-text h2 { margin: 0 0 20px; font-weight: 300; font-size: 38px; letter-spacing: 1px; }
        .order-btn { margin-top: 40px; padding: 25px; background: var(--text); color: #fff; border: none; border-radius: 25px; text-transform: uppercase; letter-spacing: 3px; font-size: 12px; cursor: pointer; transition: 0.4s; }
        .order-btn:hover { background: #000; transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        @media (max-width: 900px) {
            .modal-content { flex-direction: column; height: 90vh; overflow-y: auto; }
            .modal-img, .modal-text { width: 100%; }
            .modal-text { padding: 40px; }
            .grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .brand-logo-main { letter-spacing: 6px !important; }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ПРИВЕТСТВИЯ -->
    <div id="welcome-screen" class="screen">
        <div class="brand-logo-main">MARYAM SHAKHMAEVA</div>
        
        <div class="btn-group">
            <button class="nav-btn" onclick="openCat('namaznik')">Намазники</button>
            <button class="nav-btn" onclick="openCat('dress')">Платья</button>
            <a href="https://instagram.com" target="_blank" class="nav-btn instagram">
                <div class="insta-icon"></div>
                Instagram
            </a>
        </div>
    </div>

    <!-- ЭКРАН КАТАЛОГА -->
    <div id="catalog-screen" class="screen hidden">
        <header class="catalog-header">
            <button class="back-btn" onclick="closeCat()">← назад</button>
            <div class="header-logo-text">MARYAM SHAKHMAEVA</div>
            <div style="width: 40px;"></div>
        </header>
        <div class="container">
            <h2 id="cat-title" style="text-align:center; font-weight:200; text-transform:uppercase; letter-spacing:5px; margin-bottom:60px; font-size: 28px;"></h2>
            <div id="product-grid" class="grid"></div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div class="modal-img"><img id="modal-image" src=""></div>
            <div class="modal-text">
                <h2 id="modal-title">Название</h2>
                <p id="modal-desc" style="color:var(--secondary); line-height:1.8; margin-bottom:25px; font-size: 16px;">Описание</p>
                <p id="modal-price" style="font-size:28px; font-weight:600;"></p>
                <button class="order-btn" onclick="orderWA()">Заказать в WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { name: "Намазник «Аура»", price: "3 000 ₽", desc: "Премиальный хлопок, свободный крой и встроенный капор. Идеально для ежедневной молитвы.", cat: "namaznik", img: "images/NA1.png" },
            { name: "Платье «Ника»", price: "2 500 ₽", desc: "Элегантный силуэт, мягкая ткань «супер-софт». В комплекте идет изящный пояс.", cat: "dress", img: "images/NA2.png" }
        ];

        function openCat(category) {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').classList.add('hidden');
                const catalog = document.getElementById('catalog-screen');
                catalog.classList.remove('hidden');
                document.getElementById('cat-title').innerText = category === 'namaznik' ? 'Намазники' : 'Платья';
                const grid = document.getElementById('product-grid');
                grid.innerHTML = products.filter(p => p.cat === category).map(p => `
                    <div class="card" onclick="openModal('${p.name}', '${p.price}', '${p.desc}', '${p.img}')">
                        <div class="img-wrapper"><img src="${p.img}"></div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <p class="desc">${p.desc}</p>
                            <p class="price">${p.price}</p>
                        </div>
                    </div>`).join('');
                setTimeout(() => catalog.style.opacity = '1', 50);
            }, 600);
        }

        function closeCat() {
            document.getElementById('catalog-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('catalog-screen').classList.add('hidden');
                const welcome = document.getElementById('welcome-screen');
                welcome.classList.remove('hidden');
                setTimeout(() => welcome.style.opacity = '1', 50);
            }, 600);
        }

        function openModal(name, price, desc, img) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = price;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-image').src = img;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); }

        function orderWA() {
            const name = document.getElementById('modal-title').innerText;
            // ПОСТАВЬ СВОЙ НОМЕР НИЖЕ (без +)
            window.open(`https://wa.me! Хочу заказать: ${name}`, '_blank');
        }
    </script>
</body>
</html>
