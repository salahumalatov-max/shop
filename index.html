<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARYAM SHAKHMAEVA | Store</title>
    <style>
        :root {
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent-insta: #E1306C;
            --glass: rgba(255, 255, 255, 0.85);
            --transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed; background-size: cover;
            color: var(--text); overflow-x: hidden;
        }

        /* Анимация названия */
        @keyframes reveal {
            from { opacity: 0; letter-spacing: 25px; filter: blur(15px); }
            to { opacity: 1; letter-spacing: 6px; filter: blur(0); }
        }

        /* НОВАЯ АНИМАЦИЯ ТЕКСТА (ВЫПЛЫВАНИЕ) */
        .changing-text-box {
            height: 30px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 300;
            color: var(--secondary);
            overflow: hidden;
            position: relative;
        }

        #text-rotator {
            display: block;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
            opacity: 1;
        }

        .text-out { transform: translateY(-20px) !important; opacity: 0 !important; filter: blur(5px); }
        .text-in { transform: translateY(20px); opacity: 0; filter: blur(5px); }

        .screen { min-height: 100vh; display: flex; flex-direction: column; width: 100%; }
        .hidden { display: none !important; }

        #welcome-screen { justify-content: center; align-items: center; text-align: center; backdrop-filter: blur(10px); }
        h1 { font-size: clamp(1.4rem, 6vw, 2.8rem); font-weight: 200; text-transform: uppercase; margin-bottom: 30px; animation: reveal 1.8s ease-out forwards; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; }
        
        .nav-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 22px; border: 1px solid rgba(0,0,0,0.1); 
            background: #ffffff !important; color: #1d1d1f !important;
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase; border-radius: 50px;
            transition: transform 0.2s ease; cursor: pointer; text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active { transform: scale(0.96); background: #1d1d1f !important; color: #ffffff !important; }
        .nav-btn.instagram { border-color: var(--accent-insta); color: var(--accent-insta) !important; }

        .catalog-header { padding: 20px; background: var(--glass); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .back-btn { background: #f5f5f7; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; text-transform: uppercase; font-size: 10px; color: var(--secondary); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        @media (min-width: 850px) { .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; } }

        .card { background: var(--glass); border-radius: 25px; padding: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4); }
        .img-wrapper { aspect-ratio: 3/4; border-radius: 18px; overflow: hidden; margin-bottom: 15px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .info h3 { font-size: 16px; font-weight: 400; margin: 0; }
        .info .desc { font-size: 12px; color: var(--secondary); line-height: 1.4; margin-bottom: 10px; }
        .info .price { font-size: 14px; font-weight: 600; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { width: 90%; max-width: 450px; background: #fff; border-radius: 35px; overflow: hidden; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 18px; cursor: pointer; background: #eee; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .modal-text { padding: 30px; }
        .order-btn { width: 100%; padding: 20px; background: var(--text); color: #fff; border: none; border-radius: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen">
        <h1>MARYAM SHAKHMAEVA</h1>
        
        <div class="changing-text-box">
            <span id="text-rotator">Работаю с любовью к деталям❤️</span>
        </div>

        <div class="btn-group">
            <div class="nav-btn" onclick="openCat('namaznik')">Намазники</div>
            <div class="nav-btn" onclick="openCat('dress')">Платья</div>
            <a href="https://www.instagram.com/maryam_shahmaeva?igsh=MWZyYWd3dzBneDZ5YQ==" target="_blank" class="nav-btn instagram">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                Instagram
            </a>
        </div>
    </div>

    <div id="catalog-screen" class="screen hidden">
        <header class="catalog-header">
            <button class="back-btn" onclick="closeCat()">← назад</button>
            <span style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600;">Store</span>
            <div style="width: 60px;"></div>
        </header>
        <div class="container">
            <h2 id="cat-title" style="text-align:center; font-weight:300; text-transform:uppercase; letter-spacing:3px; font-size:18px; margin-bottom: 30px;"></h2>
            <div id="product-grid" class="grid"></div>
        </div>
    </div>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <img id="modal-image" src="" style="width:100%; aspect-ratio:3/4; object-fit:cover;">
            <div class="modal-text">
                <h2 id="modal-title" style="margin:0; font-weight:300;"></h2>
                <p id="modal-price" style="font-size:22px; font-weight:600; margin: 10px 0;"></p>
                <p id="modal-desc" style="color:var(--secondary); font-size:14px; margin-bottom:20px;"></p>
                <button class="order-btn" onclick="orderWA()">Заказать</button>
            </div>
        </div>
    </div>

    <script>
        const rotatingTexts = [
            "Работаю с любовью к деталям❤️",
            "Более 10 лет опыта🧷",
            "Довольные клиенты⭐️⭐️⭐️⭐️⭐️"
        ];
        let textIndex = 0;
        const textElement = document.getElementById('text-rotator');

        // ИЗМЕНЕНО НА 4 СЕКУНДЫ (4000мс)
        setInterval(() => {
            textElement.classList.add('text-out');
            
            setTimeout(() => {
                textIndex = (textIndex + 1) % rotatingTexts.length;
                textElement.innerText = rotatingTexts[textIndex];
                textElement.classList.remove('text-out');
                textElement.classList.add('text-in');
                
                setTimeout(() => {
                    textElement.classList.remove('text-in');
                }, 50);
            }, 800);
        }, 4000);

        const products = [
            { name: "Намазник «Аура»", price: "3 000 ₽", desc: "Премиальный хлопок, свободный крой и встроенный капор.", cat: "namaznik", img: "images/NA1.png" },
            { name: "Платье «Ника»", price: "2 500 ₽", desc: "Элегантный силуэт, мягкая ткань «супер-софт».", cat: "dress", img: "images/NA2.png" }
        ];

        function openCat(category) {
            document.getElementById('welcome-screen').classList.add('hidden');
            const catalog = document.getElementById('catalog-screen');
            catalog.classList.remove('hidden');
            document.getElementById('cat-title').innerText = category === 'namaznik' ? 'Намазники' : 'Платья';
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.filter(p => p.cat === category).map(p => `
                <div class="card" onclick="openModal('${p.name}', '${p.price}', '${p.desc}', '${p.img}')">
                    <div class="img-wrapper"><img src="${p.img}"></div>
                    <div class="info"><h3>${p.name}</h3><p class="desc">${p.desc}</p><p class="price">${p.price}</p></div>
                </div>`).join('');
            window.scrollTo(0, 0);
        }

        function closeCat() {
            document.getElementById('catalog-screen').classList.add('hidden');
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.activeElement.blur();
            window.scrollTo(0, 0);
        }

        function openModal(name, price, desc, img) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = price;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-image').src = img;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('product-modal').classList.remove('active'); }

        function orderWA() {
            const name = document.getElementById('modal-title').innerText;
            window.open(`https://wa.me: ${name}`, '_blank');
        }
    </script>
</body>
</html>
